<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OCW user OG</title>
<style>
  /* 소셜 카드는 단일 다크로 고정(카톡·슬랙·X 미리보기 배경과 무관하게 일관) */
  :root{
    --bg:#0E0E0D; --fg:#E7E7E3; --dim:#8C8C87; --faint:#5A5A56; --line:#2A2A26;
    --ok:#6DA875; --pi:#AC85DC; --amber:#D9A441; --hover:rgba(231,231,227,0.06);
    --ag-codex:#7FA6E0; --ag-opencode:#D99A55;
    --skin:#E8C39E; --eye:#232320;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;}
  html,body{width:1200px;height:630px;background:var(--bg);color:var(--fg);font-family:var(--mono);overflow:hidden;}
  .card{width:1200px;height:630px;padding:46px 60px 40px;display:flex;flex-direction:column;position:relative;}

  /* ── 픽셀 병정(랜딩과 동일 스프라이트) ── */
  .sprite{display:block;}
  .px-s{fill:var(--skin);} .px-e{fill:var(--eye);} .px-r{fill:var(--fg);} .px-k{fill:var(--ok);}
  .army-claude .px-u{fill:var(--fg);}
  .army-codex .px-u{fill:var(--ag-codex);}
  .army-opencode .px-u{fill:var(--ag-opencode);}
  .army-pi .px-u{fill:var(--pi);}

  .eyebrow{color:var(--dim);font-size:21px;letter-spacing:.14em;}
  .cols{display:flex;gap:52px;margin-top:28px;flex:1;min-height:0;}

  /* 좌: 병정 초상 액자 + 계급 */
  .pframe{width:320px;flex:none;border:2px solid var(--line);border-radius:10px;background:var(--hover);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px 0;}
  .pframe .soldier{width:180px;height:180px;position:relative;}
  .tdots{position:absolute;top:-14px;left:42px;display:flex;gap:10px;}
  .tdots i{width:13px;height:13px;background:var(--faint);display:block;}
  .tdots i:nth-child(2),.tdots i:nth-child(3){opacity:.4;}
  .rankrow{display:flex;align-items:center;gap:14px;font-size:28px;font-weight:700;}
  .rankrow .en{color:var(--dim);font-weight:400;}

  /* 우: 오늘의 출격 */
  .right{flex:1;display:flex;flex-direction:column;min-width:0;}
  .idline{display:flex;align-items:baseline;gap:16px;}
  .nick{font-size:58px;font-weight:800;letter-spacing:-0.03em;line-height:1;}
  .loc{color:var(--dim);font-size:22px;}
  .hero{margin-top:26px;}
  .hero .num{font-size:100px;font-weight:800;line-height:.85;letter-spacing:-0.045em;font-variant-numeric:tabular-nums;}
  .hero .num.rec{color:var(--amber);}
  .hero .lab{font-size:25px;color:var(--dim);margin-top:12px;}
  .hero .lab b{color:var(--fg);}

  /* 오늘의 도전: 내 최고기록 대비 게이지(앰버). 글리프 대신 div 블록 — 렌더 폰트 이슈 원천 차단 */
  .chal{margin-top:18px;font-size:23px;color:var(--dim);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .chal b{color:var(--fg);}
  .chal .newrec{color:var(--amber);font-weight:700;}
  .gaugebar{display:inline-flex;gap:4px;}
  .gaugebar i{width:13px;height:22px;background:var(--faint);display:block;border-radius:2px;}
  .gaugebar i.on{background:var(--amber);}

  .streakline{margin-top:12px;font-size:22px;color:var(--amber);}
  .streakline b{color:var(--fg);}
  .streakline .since{color:var(--faint);}

  .lifetime{margin-top:auto;border-top:2px dotted var(--line);padding-top:16px;font-size:20px;color:var(--dim);
    display:flex;align-items:baseline;justify-content:space-between;gap:20px;}
  .lifetime b{color:var(--fg);}
  .lifetime .k{color:var(--faint);letter-spacing:.08em;font-size:17px;margin-right:8px;}
  .lifetime .when{color:var(--faint);letter-spacing:.04em;white-space:nowrap;}

  .foot{margin-top:20px;display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:19px;}
  .foot .live{display:flex;align-items:center;gap:10px;}
  .foot .live i{width:11px;height:11px;border-radius:50%;background:var(--ok);display:block;}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">OPEN CODE WAR · DAILY SORTIE</div>

    <div class="cols">
      <div class="pframe">
        <span class="soldier" id="portrait"></span>
        <span class="rankrow" id="rankrow" style="display:none"></span>
      </div>
      <div class="right">
        <div class="idline"><span class="nick" id="nick">–</span><span class="loc" id="loc"></span></div>
        <div class="hero">
          <div class="num" id="heroNum">0</div>
          <div class="lab" id="heroLab"></div>
        </div>
        <div class="chal" id="chal" style="display:none"></div>
        <div class="streakline" id="badge" style="display:none"></div>
        <div class="lifetime" id="lifetime" style="display:none"></div>
      </div>
    </div>

    <div class="foot">
      <div>no prompt content · character counts only</div>
      <div class="live"><i></i><span>live</span></div>
    </div>
  </div>

<script>
  // 렌더러(scripts/render-og.mjs · render-service)가 이 마커를 buildData() 결과 JSON 으로 치환한다.
  var DATA = /*OCW_DATA*/{
    nick: "dododo", country: "KR", flag: "🇰🇷", city: "Seoul",
    date: "2026-07-22", dow: "Wed",
    heroChars: 24197, heroPrompts: 178, heroIsToday: true, heroDayLabel: "",
    streak: 12, streakLongest: 30, since: "Jul 11",
    series: [], axis: { l: "", m: "", r: "" },
    stamp: "2026-07-22 · KST",
    agent: "claude-code", activeToday: true,
    allTimePrompts: 1832, allTimeChars: 1770317,
    bestPrompts: 336
  }/*END*/;

  function comma(n){ return Number(n||0).toLocaleString('en-US'); }
  function compact(n){
    n = Number(n||0);
    if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
    if (n >= 1e4) return Math.round(n/1e3) + 'k';
    return comma(n);
  }

  // ── 픽셀 병정 스프라이트(랜딩과 동일 16×16 맵) ──
  var SPRITES = {
    typer1: [ // 타이핑 오퍼레이터 — 정지 화면이라 1프레임
      '................','................','...HHHHHH.......','..HHHHHHHH......','..HHHHHHHH......',
      '...SSSESS.......','...SSSSS........','..UUUUUU........','..UUUUUU...MM...','..UUUUUU...MM...',
      '..UUUUUSS..MM...','..UUUUU....MM...','...UUU..KKKKK...','...UUUUUU.......','...UUUUUUB......','..BBBBBBBB......'
    ],
    sentry: [ // 보초(소총 세워 듦) — 오늘 활동 없는 날
      '.........R......','...HHHHHHR......','..HHHHHHHR......','..HHHHHHHR......','...SSSESSR......',
      '...SSSSS.R......','..UUUUUUUR......','..UUUUUUSR......','..U.UUUU.R......','..U.UUUU........',
      '....UUUU........','....UUUU........','....UUUU........','....UU.UU.......','....UU..UU......','...BBB..BBB.....'
    ]
  };
  var SPRITE_CLS = { H:'u', U:'u', S:'s', E:'e', R:'r', B:'r', M:'r', K:'r' };
  function spriteSVG(name) {
    var map = SPRITES[name], rects = '';
    for (var y = 0; y < map.length; y++) for (var x = 0; x < map[y].length; x++) {
      var ch = map[y][x];
      if (ch !== '.') rects += '<rect x="' + x + '" y="' + y + '" width="1" height="1" class="px-' + SPRITE_CLS[ch] + '"/>';
    }
    return '<svg class="sprite" viewBox="0 0 ' + map[0].length + ' ' + map.length + '" width="100%" height="100%" shape-rendering="crispEdges">' + rects + '</svg>';
  }

  // ── 계급(정책: DESIGN.md §16, 웹 index.html 의 RANKS 와 동일 값) ──
  var RANKS = [
    { ko:'이병', en:'Private', min:0, ins:['bars',1] }, { ko:'일병', en:'PFC', min:200, ins:['bars',2] },
    { ko:'상병', en:'Corporal', min:1000, ins:['bars',3] }, { ko:'병장', en:'Sergeant', min:3000, ins:['bars',4] },
    { ko:'하사', en:'Staff Sgt', min:7000, ins:['chev',1] }, { ko:'중사', en:'Sgt 1st Class', min:15000, ins:['chev',2] },
    { ko:'상사', en:'Master Sgt', min:30000, ins:['chev',3] }, { ko:'소위', en:'2nd Lt', min:60000, ins:['dia',1] },
    { ko:'대위', en:'Captain', min:120000, ins:['dia',2] }, { ko:'소령', en:'Major', min:250000, ins:['dia',3] },
    { ko:'대령', en:'Colonel', min:500000, ins:['dia',4] }, { ko:'장군', en:'General', min:1000000, ins:['star',1] }
  ];
  var INS_UNIT = {
    bars: ['KKKKKKKKKK'],
    chev: ['....KK....','...KKKK...','..KK..KK..'],
    dia: ['..K..','.KKK.','KKKKK','.KKK.','..K..'],
    star: ['....K....','....K....','.KKKKKKK.','..KKKKK..','...KKK...','..KK.KK..','.K.....K.']
  };
  function insigniaSVG(kind, n, scale) {
    var map, i;
    if (kind === 'dia') {
      map = INS_UNIT.dia.map(function(row){ return Array(n).fill(row).join('.'); });
    } else if (kind === 'star') {
      map = INS_UNIT.star;
    } else {
      map = [];
      for (i = 0; i < n; i++) {
        if (i) map.push('.'.repeat(INS_UNIT[kind][0].length));
        map = map.concat(INS_UNIT[kind]);
      }
    }
    var rects = '';
    for (var y = 0; y < map.length; y++) for (var x = 0; x < map[y].length; x++)
      if (map[y][x] === 'K') rects += '<rect x="' + x + '" y="' + y + '" width="1" height="1" class="px-k"/>';
    var w = map[0].length, h = map.length;
    return '<svg viewBox="0 0 ' + w + ' ' + h + '" width="' + w * scale + '" height="' + h * scale + '" shape-rendering="crispEdges">' + rects + '</svg>';
  }

  var d = DATA;

  // 초상: 주력 에이전트 군복 + 포즈(오늘 활동 → 타이핑, 아니면 보초)
  var AGENT_ARMY = { 'claude-code':'army-claude', codex:'army-codex', opencode:'army-opencode', pi:'army-pi' };
  var portrait = document.getElementById('portrait');
  portrait.className = 'soldier ' + (AGENT_ARMY[d.agent] || 'army-claude');
  var active = d.activeToday != null ? d.activeToday : !!d.heroIsToday;
  portrait.innerHTML = active
    ? spriteSVG('typer1') + '<span class="tdots"><i></i><i></i><i></i></span>'
    : spriteSVG('sentry');

  // 계급(allTimePrompts 있을 때만 — 렌더러가 구버전이면 자동 생략)
  if (typeof d.allTimePrompts === 'number') {
    var ri = 0;
    while (ri + 1 < RANKS.length && d.allTimePrompts >= RANKS[ri + 1].min) ri++;
    var rk = RANKS[ri];
    var row = document.getElementById('rankrow');
    // 계급은 계급장(인시그니아)만 표시 — 텍스트 라벨(ko/en) 제외
    row.innerHTML = '<span>' + insigniaSVG(rk.ins[0], rk.ins[1], 6) + '</span>';
    row.style.display = 'inline-flex';
  }

  document.getElementById('nick').textContent = d.nick;
  document.getElementById('loc').textContent =
    (d.country ? d.country + ' ' + (d.flag || '') : '') + (d.city ? ' · ' + d.city : '');

  // 히어로 = 가장 최근 활동일의 prompts. 신기록(오늘 > 종전 최고)이면 앰버 강조.
  var best = typeof d.bestPrompts === 'number' ? d.bestPrompts : null;
  var isRecord = !!(d.heroIsToday && best != null && best > 0 && d.heroPrompts > best);
  var numEl = document.getElementById('heroNum');
  numEl.textContent = comma(d.heroPrompts);
  if (isRecord) numEl.className = 'num rec';
  var when = d.heroIsToday ? 'fired today' : '· ' + d.heroDayLabel;
  document.getElementById('heroLab').innerHTML =
    '<b>prompts</b> ' + when + ' · <b>' + comma(d.heroChars) + '</b> chars';

  // 오늘의 도전 게이지: 내 최고기록 대비(div 블록 10칸)
  function gaugeHtml(on) {
    var out = '<span class="gaugebar">';
    for (var i = 0; i < 10; i++) out += '<i' + (i < on ? ' class="on"' : '') + '></i>';
    return out + '</span>';
  }
  if (best != null && best > 0) {
    var chal = document.getElementById('chal');
    if (isRecord) {
      // 꽉 찬 게이지가 곧 100% — 퍼센트 표기는 중복이라 생략(한 줄 유지)
      chal.innerHTML = '<span class="newrec">⭐ NEW PERSONAL BEST</span><span>· previous <b>' + comma(best) + '</b></span>' + gaugeHtml(10);
    } else {
      var pct = Math.min(100, Math.round((d.heroPrompts / best) * 100));
      chal.innerHTML = '<span>vs my best <b>' + comma(best) + '</b></span>' + gaugeHtml(Math.min(10, Math.round(pct / 10))) + '<b>' + pct + '%</b>';
    }
    chal.style.display = 'flex';
  }

  // 스트릭 — 현재 캠페인(진행 중일 때만) + 최장 기록(현재보다 클 때만 · best N)
  if (d.streak > 0) {
    var badge = document.getElementById('badge');
    var best = (d.streakLongest && d.streakLongest > d.streak) ? ' <span class="since">· best ' + d.streakLongest + '</span>' : '';
    badge.innerHTML = '🔥 <b>' + d.streak + '-day campaign</b>' + best + (d.since ? ' <span class="since">· since ' + d.since + '</span>' : '');
    badge.style.display = 'block';
  }

  // 누적(전 기간)
  if (typeof d.allTimePrompts === 'number') {
    var lt = document.getElementById('lifetime');
    lt.innerHTML =
      '<span class="stats"><span class="k">ALL-TIME</span><b>' + comma(d.allTimePrompts) + '</b> prompts' +
      (typeof d.allTimeChars === 'number' ? ' · <b>' + compact(d.allTimeChars) + '</b> chars' : '') +
      '</span>' +
      (d.date ? '<span class="when">' + d.date + (d.dow ? ' ' + d.dow : '') + '</span>' : '');
    lt.style.display = 'flex';
  }
</script>
</body>
</html>
