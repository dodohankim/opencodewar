<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OCW user OG</title>
<style>
  /* 소셜 카드는 단일 다크로 고정(카톡·슬랙·X 미리보기 배경과 무관하게 일관) */
  :root{
    --bg:#0E0E0D; --fg:#E7E7E3; --dim:#8C8C87; --faint:#5A5A56; --line:#2A2A26;
    --ok:#6DA875; --ag-pi:#AC85DC;
    --mono: ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;}
  html,body{width:1200px;height:630px;background:var(--bg);color:var(--fg);font-family:var(--mono);overflow:hidden;}
  .card{width:1200px;height:630px;padding:54px 60px 48px;display:flex;flex-direction:column;position:relative;}

  .top{display:flex;align-items:center;justify-content:space-between;color:var(--dim);font-size:22px;}
  .lights{display:flex;gap:10px;}
  .lights i{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--faint);display:block;}
  .dom{font-weight:600;color:var(--fg);letter-spacing:.02em;}

  .cmd{margin-top:24px;color:var(--dim);font-size:22px;}
  .cmd .sig{color:var(--fg);}
  .cmd .cur{display:inline-block;width:12px;height:22px;background:var(--fg);vertical-align:-3px;margin-left:4px;}

  .idrow{display:flex;align-items:baseline;gap:18px;margin-top:14px;margin-bottom:6px;}
  .nick{font-size:64px;font-weight:700;letter-spacing:-0.02em;line-height:1;}
  .rank{font-size:26px;font-weight:700;background:var(--fg);color:var(--bg);border-radius:8px;padding:5px 13px;}
  .loc{color:var(--dim);font-size:24px;}

  /* 오늘 히어로(숫자) 위 · 그래프 아래 — 세로 배치로 후킹 강화 */
  .body{display:flex;flex-direction:column;gap:16px;margin-top:20px;}
  .hero .big{font-size:94px;font-weight:700;line-height:0.86;letter-spacing:-0.04em;font-variant-numeric:tabular-nums;}
  .hero .unit{font-size:27px;color:var(--dim);margin-top:12px;}
  .hero .sub{font-size:22px;line-height:1.5;color:var(--faint);margin-top:12px;font-variant-numeric:tabular-nums;}
  .hero .sub b{color:var(--fg);font-weight:600;}

  /* 최근 7일 막대 — 전체 폭으로 숫자 아래, 굵게. 오늘(마지막) 강조 + 요일 축 */
  .spark{width:100%;}
  .spark .lbl{font-size:19px;color:var(--faint);text-align:left;margin-bottom:10px;}
  .bars{display:flex;align-items:flex-end;gap:16px;height:104px;}
  .bars .b{flex:1;background:var(--fg);border-radius:3px;min-height:5px;}
  .bars .b.tdy{background:var(--ag-pi);}
  .bars .b .cap{display:block;height:6px;background:var(--ag-pi);border-radius:3px 3px 0 0;}
  .axis{display:flex;gap:16px;margin-top:12px;}
  .axis .al{flex:1;text-align:center;font-size:18px;color:var(--faint);}
  .axis .al.tdyl{color:var(--ag-pi);font-weight:600;}

  .foot{margin-top:auto;padding-top:20px;display:flex;align-items:center;justify-content:space-between;color:var(--faint);font-size:20px;}
  .foot .tag{color:var(--dim);}
  .foot .live{display:flex;align-items:center;gap:10px;}
  .foot .live i{width:11px;height:11px;border-radius:50%;background:var(--ok);display:block;}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="lights"><i></i><i></i><i></i></div>
      <div class="dom">opencodewar.dev</div>
    </div>

    <div class="cmd"><span class="sig">you@open-code-war</span>:~$ GET /u/<span id="uNick2"></span><span class="cur"></span></div>

    <div class="idrow">
      <div class="nick" id="nick">–</div>
      <div class="rank" id="rank">#–</div>
      <div class="loc" id="loc"></div>
    </div>

    <div class="body">
      <div class="hero">
        <div class="big" id="today">0</div>
        <div class="unit" id="unit">prompts today</div>
        <div class="sub" id="sub"></div>
      </div>
      <div class="spark">
        <div class="lbl">last 7 days</div>
        <div class="bars" id="bars"></div>
        <div class="axis" id="axis"></div>
      </div>
    </div>

    <div class="foot">
      <div class="tag">no prompt content · character counts only</div>
      <div class="live"><i></i><span id="stamp"></span></div>
    </div>
  </div>

<script>
  // 렌더러(scripts/render-og.mjs)가 이 마커를 실제 JSON 으로 치환한다.
  var DATA = /*OCW_DATA*/{
    nick: "dododo", rank: 1, total: 2, country: "KR", flag: "🌇", city: "Seoul",
    today: { prompts: 26, chars: 62017 },
    d30: { prompts: 1155, chars: 1224593 },
    series: [3,2,4,2,3,2,4,3,2,3,4,2,3,2,4,3,2,3,4,3,2,4,3,11,8,25,40,337,26,4],
    stamp: "2026-07-21 · KST"
  }/*END*/;

  function comma(n){ return Number(n||0).toLocaleString('en-US'); }
  function compact(n){ n=Number(n||0); if(n>=1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'')+'M'; if(n>=1e4) return Math.round(n/1e3)+'k'; return comma(n); }

  var d=DATA;
  document.getElementById('nick').textContent=d.nick;
  document.getElementById('uNick2').textContent=d.nick;
  document.getElementById('rank').textContent='#'+d.rank;
  document.getElementById('loc').textContent=(d.country?d.country+' '+(d.flag||''):'')+(d.city?' · '+d.city:'');
  document.getElementById('today').textContent=comma(d.today.prompts);
  // "prompts today" 의 today 를 오늘 날짜(MM-DD)로. chars 뒤에는 날짜 표기 없음.
  document.getElementById('unit').textContent='prompts · '+d.stamp.slice(5,10);
  document.getElementById('sub').innerHTML=
    '<b>'+comma(d.today.chars)+'</b> chars<br>30d · <b>'+comma(d.d30.prompts)+'</b> prompts · <b>'+compact(d.d30.chars)+'</b> chars';
  document.getElementById('stamp').textContent=d.stamp;

  // 최근 7일 막대(오늘=마지막 강조) + 요일 축
  var s=(d.series||[]).slice(-7), max=Math.max.apply(null,s.concat([1])), peak=s.indexOf(Math.max.apply(null,s));
  document.getElementById('bars').innerHTML=s.map(function(v,i){
    var h=Math.max(5,Math.round(v/max*104));
    var cap=i===peak&&v>0?'<span class="cap"></span>':'';
    return '<div class="b'+(i===s.length-1?' tdy':'')+'" style="height:'+h+'px">'+cap+'</div>';
  }).join('');
  var dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var pt=d.stamp.slice(0,10).split('-').map(Number), bd=Date.UTC(pt[0],pt[1]-1,pt[2]);
  var wk=[];for(var i=0;i<7;i++){wk.push(dow[new Date(bd-(6-i)*86400000).getUTCDay()]);}
  document.getElementById('axis').innerHTML=wk.map(function(w,i){return '<div class="al'+(i===6?' tdyl':'')+'">'+w+'</div>';}).join('');
</script>
</body>
</html>
